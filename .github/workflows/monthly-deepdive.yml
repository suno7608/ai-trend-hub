name: Monthly Deep Dive Pipeline v2.0

on:
  schedule:
    # Runs on the 1st of each month at 05:00 UTC (14:00 KST)
    - cron: '0 5 1 * *'
  workflow_dispatch:
    inputs:
      month:
        description: 'Target month (e.g. 2026-04). Leave empty for previous month.'
        required: false
      force:
        description: 'Overwrite existing deep dive'
        required: false
        default: 'false'
      simple:
        description: 'Use simple mode (v1.0 fallback, skips 7-stage pipeline)'
        required: false
        default: 'false'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "monthly-pipeline"
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: "Step 1: Generate Monthly Deep Dive (7-Stage Pipeline)"
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.month }}" ]; then
            ARGS="--month=${{ github.event.inputs.month }}"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          if [ "${{ github.event.inputs.simple }}" = "true" ]; then
            ARGS="$ARGS --simple"
          fi
          echo "Running: node scripts/generate-monthly.js $ARGS"
          node scripts/generate-monthly.js $ARGS
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-sonnet-4-20250514' }}

      - name: "Step 2: Build site"
        run: node scripts/build.js

      - name: "Step 3: Commit and push"
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AI Trend Hub Bot"
          git add content/monthly/
          git diff --staged --quiet || git commit -m "📖 Monthly Deep Dive $(date +%Y-%m) (Enhanced v2.0)"
          git push || echo "Nothing to push"

      - name: "Step 4: Upload to GitHub Pages"
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: "Notify: Success"
        if: success()
        run: node scripts/notify-telegram.js --status=success --pipeline=monthly --details="Monthly Deep Dive v2.0 generated (7-stage pipeline)" --run-url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: "Notify: Failure"
        if: failure()
        run: |
          npm ci 2>/dev/null || true
          node scripts/notify-telegram.js --status=failure --pipeline=monthly --details="Monthly Deep Dive v2.0 pipeline failed" --run-url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: generate
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
